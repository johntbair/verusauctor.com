<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verus Auctor</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FAFBFC; --surface: #FFFFFF; --text: #0A0A0F;
            --text-secondary: #4A4A5A; --accent: #3B82F6; --border: #E5E7EB;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0A0A0F; --surface: #141420; --text: #F0F0F5;
                --text-secondary: #9A9AB0; --accent: #60A5FA; --border: #1F1F35;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        h1 { font-size: 3rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 1rem; }
        p { font-size: 1.25rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 0.5rem; }
        .accent { color: var(--accent); }
        .divider { width: 60px; height: 2px; background: var(--accent); margin: 2rem auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verus Auctor</h1>
        <div class="divider"></div>
        <p>Something is being built here.</p>
        <p class="accent">Deliberately.</p>
    </div>
</body>
</html>
